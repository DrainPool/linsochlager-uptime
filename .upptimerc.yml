owner: DrainPool
repo: linsochlager-uptime

sites:
  - name: Lins & Lager (Main)
    url: https://linsochlager.net
    icon: https://linsochlager.net/favicon.ico
    interval: 300
  - name: Shop
    url: https://linsochlager.net/butik
    interval: 300
  - name: Booking
    url: https://linsochlager.net/boka
    interval: 300
  - name: Photography
    url: https://linsochlager.net/foto
    interval: 300
  - name: Health Check
    url: https://vpvzqdcvlershkzpvqle.supabase.co/functions/v1/check-system-health
    interval: 600

status-website:
  cname: false
  logoUrl: https://linsochlager.net/logo.png
  theme: dark
  introTitle: "Lins & Lager Status"
  introMessage: "Vi övervakar ständigt systemets status"
  links:
    - rel: canonical
      href: https://linsochlager.net
    - rel: icon
      href: https://linsochlager.net/favicon.ico

notifications:
  - type: telegram
    enabled: true

assignees:
  - DrainPool
